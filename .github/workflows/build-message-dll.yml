name: Build Message DLL

on:
  push:
    branches: [main]
    paths:
      - 'messages/NUTMonitorMessages.mc'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Pin to full commit SHAs, not floating tags.
      # Floating tags (v4, v1) can be silently moved to malicious commits.
      # Verify these SHAs at:
      #   https://github.com/actions/checkout/releases
      #   https://github.com/ilammy/msvc-dev-cmd/releases
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: ilammy/msvc-dev-cmd@7315a672958de5d55d5d6b4c11c95c3daefeeda  # v1.23.0

      - name: Compile message file
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          # mc.exe  → NUTMonitorMessages.rc + MSG00001.bin + NUTMonitorMessages.h
          # -U      → Unicode message table (recommended for modern Windows)
          # -r/-h   → output directory for .rc/.bin and .h respectively
          & mc.exe -U messages/NUTMonitorMessages.mc -r messages/ -h messages/
          if ($LASTEXITCODE -ne 0) { throw "mc.exe failed with exit code $LASTEXITCODE" }

          # rc.exe → NUTMonitorMessages.res
          & rc.exe messages/NUTMonitorMessages.rc
          if ($LASTEXITCODE -ne 0) { throw "rc.exe failed with exit code $LASTEXITCODE" }

          # link.exe → NUTMonitorMessages.dll
          # /DLL     → build a DLL
          # /NOENTRY → no entry point (message-only DLL, no code)
          # /MACHINE → target architecture
          & link.exe /DLL /NOENTRY /MACHINE:X64 /OUT:NUTMonitorMessages.dll messages/NUTMonitorMessages.res
          if ($LASTEXITCODE -ne 0) { throw "link.exe failed with exit code $LASTEXITCODE" }

          Write-Host "Build succeeded: NUTMonitorMessages.dll"

      - name: Verify PE structure
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          # A message-only DLL built with /NOENTRY should contain nothing but a
          # resource section (.rsrc). If a compromised linker injected executable
          # code, it would show up here as an executable section or imports.
          Write-Host "--- dumpbin /HEADERS ---"
          $headers = & dumpbin.exe /HEADERS NUTMonitorMessages.dll 2>&1
          $headers | Write-Host

          Write-Host "--- dumpbin /IMPORTS ---"
          $imports = & dumpbin.exe /IMPORTS NUTMonitorMessages.dll 2>&1
          $imports | Write-Host

          Write-Host "--- dumpbin /SECTIONS ---"
          $sections = & dumpbin.exe /SECTIONS NUTMonitorMessages.dll 2>&1
          $sections | Write-Host

          # Fail if any section has the EXECUTE characteristic
          if ($sections | Where-Object { $_ -match "EXECUTE" }) {
            throw "SECURITY: DLL contains executable sections — possible code injection."
          }

          # Fail if there are any imports (message-only DLLs have none)
          if ($imports | Where-Object { $_ -match "Import Address Table" }) {
            throw "SECURITY: DLL has imports — possible code injection."
          }

          # Fail if entry point is non-zero (/NOENTRY should produce 0)
          $epLine = $headers | Where-Object { $_ -match "entry point" }
          if ($epLine -match "entry point\s+([0-9A-Fa-f]+)") {
            $ep = [Convert]::ToInt64($Matches[1], 16)
            if ($ep -ne 0) {
              throw "SECURITY: DLL has a non-zero entry point ($($Matches[1])) — possible code injection."
            }
          }

          Write-Host "PE structure OK: no executable sections, no imports, zero entry point."

      - name: Commit DLL to repository
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NUTMonitorMessages.dll
          $changed = git diff --staged --quiet; $LASTEXITCODE
          if ($changed -ne 0) {
            git commit -m "Build: update NUTMonitorMessages.dll from ${{ github.sha }}"
            git push
          } else {
            Write-Host "DLL unchanged, nothing to commit."
          }
